<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>【本能·宇宙】你是哪位受害者？</title>
  <style>
    :root {
      --bg: #0d0d14;
      --card: #16162a;
      --border: #2e2e50;
      --accent: #a78bfa;
      --accent2: #818cf8;
      --text: #ffffff;
      --text-muted: #94a3b8;
      --option-hover: #1e1e38;
      --option-selected: #2d2b55;
      --option-selected-border: #a78bfa;
      --progress-bg: #1e1e38;
      --progress-fill: linear-gradient(90deg, #818cf8, #a78bfa);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 80px;
      color-scheme: dark;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 40%, rgba(99,102,241,.12) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 60%, rgba(167,139,250,.08) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; width: 100%; max-width: 700px; }

    /* ── 封面 ── */
    #screen-cover {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      gap: 24px;
    }

    .moon-icon {
      font-size: 82px;
      line-height: 1;
      filter: drop-shadow(0 0 28px rgba(167,139,250,.6));
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    .cover-tag { font-size: 12px; letter-spacing: 3px; color: var(--accent); }

    .cover-title {
      font-size: clamp(26px, 6vw, 46px);
      font-weight: 700;
      line-height: 1.3;
      background: linear-gradient(135deg, #e0e7ff 0%, #a78bfa 50%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .cover-sub {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.8;
      max-width: 440px;
    }


    .btn-start {
      margin-top: 4px;
      padding: 14px 50px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 4px 28px rgba(99,102,241,.4);
      transition: transform .2s, box-shadow .2s;
    }
    .btn-start:hover { transform: translateY(-3px); box-shadow: 0 8px 36px rgba(99,102,241,.55); }

    /* ── 测验 ── */
    #screen-quiz { display: none; padding-top: 48px; }

    .progress-bar-wrap {
      width: 100%; height: 4px;
      background: var(--progress-bg);
      border-radius: 99px; margin-bottom: 36px;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 99px;
      background: var(--progress-fill);
      transition: width .45s cubic-bezier(.4,0,.2,1);
    }

    .q-counter { font-size: 12px; color: var(--accent); letter-spacing: 2px; margin-bottom: 10px; }

    .q-scene {
      font-size: 12px;
      color: #6366f1;
      letter-spacing: 1px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .q-scene::before { content: '✦'; }

    .q-text {
      font-size: clamp(16px, 3.5vw, 21px);
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 32px;
      font-weight: 600;
    }

    .options-list { display: flex; flex-direction: column; gap: 13px; }

    .option-btn {
      width: 100%;
      text-align: left;
      padding: 17px 22px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      line-height: 1.65;
      cursor: pointer;
      transition: background .18s, border-color .18s, transform .12s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .option-btn:hover { background: var(--option-hover); border-color: var(--accent2); transform: translateX(4px); }
    .option-btn.selected { background: var(--option-selected); border-color: var(--option-selected-border); color: #e0e7ff; }

    .option-label {
      flex-shrink: 0;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: #1e1e38;
      text-align: center;
      line-height: 26px;
      font-size: 12px;
      color: var(--accent);
      font-weight: 700;
    }
    .option-btn.selected .option-label { background: var(--accent); color: #fff; }

    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; }

    .btn-prev {
      padding: 12px 24px;
      border-radius: 50px; border: 1.5px solid var(--border);
      background: transparent; color: var(--text-muted);
      font-size: 14px; font-family: inherit; cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-prev:hover { border-color: var(--accent); color: var(--accent); }
    .btn-prev:disabled { opacity: .25; pointer-events: none; }

    .btn-next {
      padding: 12px 36px;
      border-radius: 50px; border: none;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      color: #fff; font-size: 15px; font-family: inherit;
      cursor: pointer; letter-spacing: 1px;
      opacity: .4; pointer-events: none;
      transition: opacity .2s, transform .15s;
    }
    .btn-next.active { opacity: 1; pointer-events: all; }
    .btn-next.active:hover { transform: translateY(-2px); }

    /* ── 结果 ── */
    #screen-result {
      display: none;
      padding-top: 56px;
      flex-direction: column;
      align-items: center;
      gap: 26px;
    }

    .result-icon { font-size: 76px; animation: float 5s ease-in-out infinite; }
    .result-tag { font-size: 12px; letter-spacing: 3px; color: var(--accent); }

    .result-name {
      font-size: clamp(28px, 7vw, 50px);
      font-weight: 800;
      background: linear-gradient(135deg, #e0e7ff 0%, #a78bfa 50%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      text-align: center;
    }


    .result-card {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 28px 28px 24px;
      text-align: left;
    }
    .result-card-label { font-size: 11px; letter-spacing: 3px; color: var(--accent); margin-bottom: 14px; text-transform: uppercase; }
    .result-desc { font-size: 15px; line-height: 1.9; color: var(--text); }
    .breakdown-list { display: flex; flex-direction: column; gap: 12px; }
    .breakdown-item { display: flex; flex-direction: column; gap: 4px; }
    .breakdown-meta { display: flex; justify-content: space-between; font-size: 13px; color: var(--text); }
    .breakdown-name { font-weight: 600; }
    .breakdown-pct { color: var(--accent); }
    .breakdown-bar-bg { height: 6px; border-radius: 99px; background: var(--progress-bg); overflow: hidden; }
    .breakdown-bar-fill { height: 100%; border-radius: 99px; background: var(--progress-fill); transition: width .6s ease; }
    .breakdown-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .btn-retry {
      padding: 13px 40px; border-radius: 50px;
      border: 1.5px solid var(--accent); background: transparent;
      color: var(--accent); font-size: 15px; font-family: inherit;
      cursor: pointer; letter-spacing: 1px;
      transition: background .18s, color .18s;
    }
    .btn-retry:hover { background: var(--accent); color: #fff; }

    .fade-in { animation: fadeIn .5s ease both; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- ─────────── 封面 ─────────── -->
<div class="wrap" id="screen-cover">
  <div class="moon-icon">🌙</div>
  <div class="cover-title">你是《本能》宇宙里的<br>哪位受害者？</div>

  <button class="btn-start" onclick="startQuiz()">开始测验 →</button>

<!-- ─────────── 测验 ─────────── -->
<div class="wrap" id="screen-quiz">

  <div class="options-list" id="options-list"></div>
  <div class="nav-row">
    <button class="btn-prev" id="btn-prev" onclick="prevQuestion()">← 上一题</button>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">下一题 →</button>
  </div>
</div>

<!-- ─────────── 结果 ─────────── -->
<div class="wrap" id="screen-result">
  <div class="result-icon" id="result-icon"></div>
  <div class="result-tag">你的确诊结果</div>
  <div class="result-name" id="result-name"></div>
  <div class="result-card">

    <div class="result-desc" id="result-desc"></div>
    <div class="result-quote" id="result-quote"></div>
  </div>
  <div class="result-card" id="result-breakdown">
    <div class="result-card-label">✦ 答题轨迹</div>
    <div class="breakdown-list" id="breakdown-list"></div>
  </div>
  <button class="btn-retry" onclick="retryQuiz()">再测一次 ↺</button>
</div>

      { text: "「你回来了？」就这一句，好像对方只是去便利店买了趟东西。", scores: { himetsuru: 3, daikuri: 1 } },
      { text: "热烈地拥抱，说了很多对方都没来得及记住的话。", scores: { hizamaru: 3, kiyomitsu: 1 } },
      { text: "没有特别的话，只是看了一眼，点了点头。", scores: { nansen: 3 } },

    ]
  },
  {
    scene: "刀展场景 · 《花骷髅》",
    q: "有人闯进了一个戒备森严的地方，取走了本来就属于她的东西。你对这件事的看法是……",
    opts: [
      { text: "主人取回自己的东西，需要别人的许可吗？理所当然。", scores: { nobunaga: 5, hizamaruChar: 2 } },
      { text: "行事太嚣张，但确实是她的东西，说不出什么来。", scores: { hasebe: 3, nikkari: 1 } },
      { text: "自己的东西也要走正当流程，规矩还是要守。", scores: { ishikirimaru: 2, nikkari: 2 } },
      { text: "最好别把我也卷进去。", scores: { hizamaru: 2, yamato: 1 } }
    ]
  },
  {
    scene: "暗夜场景 · 《花骷髅》",
    q: "漫长的黑暗里，你突然意识到对方的处境比你想象的要糟得多。你会……",
    opts: [
      { text: "什么都不说，只是用手碰了碰她的肩膀。", scores: { shokudaikiri: 3, hasebe: 2 } },
      { text: "问她：为什么不早点告诉我？声音有点哑。", scores: { hasebe: 3, ichigoHitofuri: 1 } },
      { text: "掉眼泪，忍也忍不住，不管她会怎么看我。", scores: { tsurumaru: 2, kiyomitsu: 2 } },
      { text: "继续装作若无其事，等她自己开口。", scores: { nansen: 2 } }
    ]
  }
,
  {
    scene: "折扇场景 · 《金色梦乡》",
    q: "你一个人练了很久的东西，有人隔着门悄悄看了你一眼，但没有进来。后来你知道了这件事，你会……",
    opts: [
      { text: "装作不知道，但心里记得，下次故意再表演得好看一点。", scores: { hachisuka: 3, smileyAoe: 1 } },
      { text: "下次见到她，直接说：你可以进来看的。", scores: { hachisuka: 3, himetsuru: 1 } },
      { text: "觉得有点被偷窥的不适，但也不会特别放在心上。", scores: { daikuri: 2, nansen: 1 } },
      { text: "心里有点高兴，但绝对不会承认。", scores: { hachisuka: 2, tsurumaru: 1 } }
    ]
  }
];

// ═══════════════════════════════════════════
//  逻辑
// ═══════════════════════════════════════════
let currentQ = 0;
let selectedOption = null;
let scores = {};
let userAnswers = [];

function initScores() {
  scores = {};
  Object.keys(RESULTS).forEach(k => (scores[k] = 0));
}

function startQuiz() {
  initScores();
  currentQ = 0;
  selectedOption = null;
  userAnswers = [];
  document.getElementById('screen-cover').style.display = 'none';
  document.getElementById('screen-result').style.display = 'none';
  const quizEl = document.getElementById('screen-quiz');
  quizEl.style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  selectedOption = null;
  const data = QUESTIONS[currentQ];
  const total = QUESTIONS.length;

  document.getElementById('progress-fill').style.width = (currentQ / total * 100) + '%';
  document.getElementById('q-counter').textContent = `问题 ${currentQ + 1} / ${total}`;
  document.getElementById('q-scene').textContent = data.scene || '';
  document.getElementById('q-text').textContent = data.q;

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  data.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn fade-in';
    btn.style.animationDelay = (i * 0.06) + 's';
    const label = document.createElement('span');
    label.className = 'option-label';
    label.textContent = labels[i];
    const text = document.createElement('span');
    text.textContent = opt.text;
    btn.appendChild(label);
    btn.appendChild(text);
    btn.onclick = () => selectOption(i, btn);
    list.appendChild(btn);
  });

  const nextBtn = document.getElementById('btn-next');
  nextBtn.classList.remove('active');
  nextBtn.textContent = currentQ === QUESTIONS.length - 1 ? '查看结果 ✦' : '下一题 →';
  const prevBtn = document.getElementById('btn-prev');
  prevBtn.disabled = currentQ === 0;
}

function selectOption(idx, btnEl) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');
  selectedOption = idx;
  document.getElementById('btn-next').classList.add('active');
}

function prevQuestion() {
  if (currentQ <= 0) return;
  currentQ--;
  // 撤销上一题的得分
  const prevOptIdx = userAnswers.pop();
  const sc = QUESTIONS[currentQ].opts[prevOptIdx].scores;
  Object.entries(sc).forEach(([k, v]) => { scores[k] = (scores[k] || 0) - v; });
  renderQuestion();
  // 恢复上一题的选中状态（必须在 renderQuestion 之后，因为按钮是动态创建的）
  const btns = document.querySelectorAll('.option-btn');
  if (btns[prevOptIdx]) btns[prevOptIdx].classList.add('selected');
  selectedOption = prevOptIdx;
  document.getElementById('btn-next').classList.add('active');
}

function nextQuestion() {
  if (selectedOption === null) return;
  const sc = QUESTIONS[currentQ].opts[selectedOption].scores;
  Object.entries(sc).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });
  userAnswers.push(selectedOption);
  currentQ++;
  if (currentQ >= QUESTIONS.length) showResult();
  else renderQuestion();
}

function showResult() {
  // 计算每个角色的理论最高得分
  const maxPossible = {};
  Object.keys(RESULTS).forEach(k => maxPossible[k] = 0);
  QUESTIONS.forEach(q => {
    const best = {};
    q.opts.forEach(opt => {
      Object.entries(opt.scores).forEach(([role, val]) => {
        if (!best[role] || val > best[role]) best[role] = val;
      });
    });
    Object.entries(best).forEach(([role, val]) => { maxPossible[role] += val; });
  });

  // 按得分比例选出最高者，同分时随机打破平局
  let winner = null, topRatio = -1;
  Object.entries(scores).forEach(([role, score]) => {
    const ratio = maxPossible[role] > 0 ? score / maxPossible[role] : 0;
    const jittered = ratio + Math.random() * 0.0001;
    if (jittered > topRatio) { topRatio = jittered; winner = role; }
  });

  const r = RESULTS[winner];
  document.getElementById('screen-quiz').style.display = 'none';
  const resultEl = document.getElementById('screen-result');
  resultEl.style.display = 'flex';
  resultEl.classList.add('fade-in');

  document.getElementById('result-icon').textContent = r.icon;
  document.getElementById('result-name').textContent = r.name;
  document.getElementById('result-desc').textContent = r.desc;
  document.getElementById('result-quote').textContent = r.quote;
  document.getElementById('progress-fill').style.width = '100%';

  // ── 答题轨迹：取得分比例前3名 ──
  const ranked = Object.entries(scores)
    .map(([role, score]) => ({
      role,
      score,
      ratio: maxPossible[role] > 0 ? score / maxPossible[role] : 0
    }))
    .sort((a, b) => b.ratio - a.ratio)
    .slice(0, 3);

  // 收集每道题对 winner 贡献最大的选项文字
  const keyAnswers = [];
  userAnswers.forEach((optIdx, qIdx) => {
    const opt = QUESTIONS[qIdx].opts[optIdx];
    const contribution = opt.scores[winner] || 0;
    if (contribution > 0) keyAnswers.push(`Q${qIdx + 1}「${opt.text.slice(0, 18)}${opt.text.length > 18 ? '…' : ''}」`);
  });

  const listEl = document.getElementById('breakdown-list');
  listEl.innerHTML = ranked.map((item, i) => {
    const name = RESULTS[item.role]?.name || item.role;
    const pct = Math.round(item.ratio * 100);
    const isWinner = item.role === winner;
    return `<div class="breakdown-item">
      <div class="breakdown-meta">
        <span class="breakdown-name">${i === 0 ? '🥇 ' : i === 1 ? '🥈 ' : '🥉 '}${name}</span>
        <span class="breakdown-pct">${pct}%</span>
      </div>
      <div class="breakdown-bar-bg">
        <div class="breakdown-bar-fill" style="width:${pct}%"></div>
      </div>
      ${isWinner && keyAnswers.length > 0
        ? `<div class="breakdown-hint">关键答题：${keyAnswers.slice(0, 3).join('　')}</div>`
        : ''}
    </div>`;
  }).join('');
}

function retryQuiz() {
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-result').classList.remove('fade-in');
  document.getElementById('screen-cover').style.display = 'flex';
}
</script>
